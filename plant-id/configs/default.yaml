data:
  species_csv: data/species.csv
  max_images_per_species: 200
  image_dir: data/images
  splits_csv: data/splits.csv
  download_workers: 4
  request_delay: 0.5  # seconds between GBIF API requests

embeddings:
  cache_path: embeddings/image_cache.h5
  text_embeddings_path: embeddings/text_embeddings.npy
  species_index_path: embeddings/species_index.json
  batch_size: 64

model:
  bioclip_hub: "hf-hub:imageomics/bioclip"
  device: "cpu"  # change to "cuda" if available
  image_size: 224

probe:
  type: "sklearn"  # or "mlp"
  checkpoint_dir: train/checkpoints
  sklearn:
    C_values: [0.01, 0.1, 1.0, 10.0]
    max_iter: 1000
    solver: "lbfgs"
    multi_class: "multinomial"
    model_path: train/checkpoints/sklearn_probe.joblib
  mlp:
    hidden_dim: 256
    dropout: 0.1
    lr: 0.001
    weight_decay: 0.0001
    epochs: 50
    patience: 5
    batch_size: 256
    model_path: train/checkpoints/mlp_probe.pt

eval:
  output_path: eval/results.json
  confusion_matrix_top_n: 20
